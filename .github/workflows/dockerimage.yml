---
name: Docker Image CI
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Cleanup
        run: docker system prune --all --force --volumes

      - name: Build the Docker image
        run: docker build --tag redmine:$(date +%s) .

      - name: Show images
        run: docker images
